name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Agent renders in sync (agents/ is the source of truth)
        run: node scripts/render-agents.mjs --check
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck test build
