  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

g:.08em;text-transform:uppercase;color:#9a978f;font-weight:600;padding-left:8px;\">Traitement<\u002Fspan>\n      <button onclick=\"{{ setTreatment_A }}\" style=\"border:none;cursor:pointer;font:inherit;font-weight:600;font-size:13px;padding:7px 14px;border-radius:9px;background:{{ trABg }};color:{{ trAFg }};\">A<\u002Fbutton>\n      <button onclick=\"{{ setTreatment_B }}\" style=\"border:none;cursor:pointer;font:inherit;font-weight:600;font-size:13px;padding:7px 14px;border-radius:9px;background:{{ trBBg }};color:{{ trBFg }};\">B<\u002Fbutton>\n    <\u002Fdiv>\n    <a href=\"swab%20%E2%80%94%20Carte%20des%20relations.dc.html\" style=\"text-decoration:none;border:1px solid #d8d5cd;background:#fff;cursor:pointer;font:inherit;font-weight:600;font-size:13px;padding:9px 16px;border-radius:12px;color:#6f6c64;\">← Carte<\u002Fa>\n    <a href=\"swab%20%E2%80%94%20Sous-groupes.dc.html\" style=\"text-decoration:none;border:1px solid #d8d5cd;background:#fff;cursor:pointer;font:inherit;font-weight:600;font-size:13px;padding:9px 16px;border-radius:12px;color:#6f6c64;\">← Sous-groupes<\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;gap:44px;align-items:flex-start;\">\n    <sc-for list=\"{{ phones }}\" as=\"p\" hint-placeholder-count=\"2\">\n      <div style=\"flex:none;\">\n        <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:14px;padding-left:4px;\">\n          <span style=\"font-family:'Newsreader',Georgia,serif;font-size:19px;\">{{ p.label }}<\u002Fspan>\n          <span style=\"font-size:12px;color:#9a978f;letter-spacing:.04em;\">{{ p.meta }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;width:384px;height:786px;background:#08070b;border-radius:{{ frameOuter }}px;padding:11px;box-shadow:0 26px 60px -22px rgba(20,18,14,.55),0 8px 22px -12px rgba(20,18,14,.4);\">\n          <div style=\"position:relative;width:100%;height:100%;border-radius:{{ frameInner }}px;overflow:hidden;background:{{ p.bg }};color:{{ p.text }};font-family:{{ p.fontBody }};display:flex;flex-direction:column;\">\n\n            <sc-if value=\"{{ isIos }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position:relative;height:54px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 30px;z-index:5;\">\n                <span style=\"font-weight:600;font-size:15px;letter-spacing:.02em;\">9:41<\u002Fspan>\n                <div style=\"position:absolute;left:50%;top:11px;transform:translateX(-50%);width:118px;height:31px;background:#000;border-radius:16px;\"><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:7px;\">\n                  <div style=\"display:flex;align-items:flex-end;gap:2px;height:11px;\"><span style=\"width:3px;height:5px;border-radius:1px;background:{{ p.text }}\"><\u002Fspan><span style=\"width:3px;height:7px;border-radius:1px;background:{{ p.text }}\"><\u002Fspan><span style=\"width:3px;height:9px;border-radius:1px;background:{{ p.text }}\"><\u002Fspan><span style=\"width:3px;height:11px;border-radius:1px;background:{{ p.text }}\"><\u002Fspan><\u002Fdiv>\n                  <div style=\"width:15px;height:11px;border:1.4px solid {{ p.text }};border-radius:3px;position:relative;\"><div style=\"position:absolute;inset:1.4px;width:9px;background:{{ p.text }};border-radius:1px;\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isAndroid }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:relative;height:32px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:5;\">\n                <span style=\"font-weight:600;font-size:13px;font-family:{{ p.fontLabel }};\">9:41<\u002Fspan>\n                <div style=\"position:absolute;left:50%;top:9px;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#000;\"><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:6px;\">\n                  <div style=\"display:flex;align-items:flex-end;gap:1.5px;height:10px;\"><span style=\"width:2.5px;height:6px;background:{{ p.text }}\"><\u002Fspan><span style=\"width:2.5px;height:8px;background:{{ p.text }}\"><\u002Fspan><span style=\"width:2.5px;height:10px;background:{{ p.text }}\"><\u002Fspan><\u002Fdiv>\n                  <div style=\"width:13px;height:9px;border:1.3px solid {{ p.text }};border-radius:2px;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:6px 22px 12px;\">\n              <h2 style=\"font-family:{{ p.fontDisplay }};font-weight:400;font-size:24px;line-height:1.1;margin:0;letter-spacing:-0.01em;\">Filtrage<\u002Fh2>\n              <a href=\"swab%20%E2%80%94%20Carte%20des%20relations.dc.html\" style=\"text-decoration:none;color:{{ p.dim }};font-size:13px;font-family:{{ p.fontLabel }};\">Fermer<\u002Fa>\n            <\u002Fdiv>\n\n            <div data-screen-label=\"Paramètres modaux\" style=\"flex:1;overflow-y:auto;padding:0 22px 26px;\">\n\n              <div style=\"display:flex;align-items:flex-start;gap:10px;border:1px solid {{ p.line }};border-radius:14px;padding:13px 14px;margin-bottom:22px;background:{{ p.surface2 }};\">\n                <span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:{{ p.accent }};margin-top:5px;\"><\u002Fspan>\n                <p style=\"margin:0;font-size:13px;line-height:1.45;color:{{ p.dim }};\">Ces règles s'appliquent par défaut. À chaque envoi, swab te montre qui est filtré et te laisse forcer l'inclusion.<\u002Fp>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;flex-direction:column;gap:20px;\">\n                <sc-for list=\"{{ p.cats }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div>\n                    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px;\">\n                      <span style=\"width:11px;height:11px;border-radius:50%;background:{{ c.color }};\"><\u002Fspan>\n                      <span style=\"font-size:16px;font-weight:600;font-family:{{ p.fontDisplay }};\">{{ c.title }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"margin:0 0 12px 20px;font-size:13px;color:{{ p.faint }};line-height:1.4;font-family:{{ p.fontLabel }};\">{{ c.sub }}<\u002Fp>\n                    <div style=\"display:flex;flex-direction:column;gap:7px;\">\n                      <sc-for list=\"{{ c.options }}\" as=\"o\" hint-placeholder-count=\"3\">\n                        <button onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;font:inherit;padding:12px 14px;border-radius:13px;background:{{ o.bg }};border:1px solid {{ o.bd }};color:{{ p.text }};transition:all .18s;\">\n                          <span style=\"flex:none;width:18px;height:18px;border-radius:50%;border:2px solid {{ o.ringBd }};background:{{ o.ringBg }};display:flex;align-items:center;justify-content:center;\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ o.dot }};\"><\u002Fspan><\u002Fspan>\n                          <span style=\"flex:1;display:flex;flex-direction:column;gap:2px;\">\n                            <span style=\"font-size:14.5px;font-weight:{{ o.weight }};\">{{ o.label }}<\u002Fspan>\n                            <span style=\"font-size:12px;color:{{ p.faint }};font-family:{{ p.fontLabel }};line-height:1.35;\">{{ o.desc }}<\u002Fspan>\n                          <\u002Fspan>\n                        <\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <div style=\"margin-top:24px;padding-top:18px;border-top:1px solid {{ p.line }};\">\n                <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:{{ p.faint }};font-weight:600;font-family:{{ p.fontLabel }};margin-bottom:12px;\">Aperçu sur Théo · en pause<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:12px;border:1px solid {{ p.line }};border-radius:14px;padding:13px 15px;\">\n                  <span style=\"flex:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:{{ p.fontDisplay }};font-size:17px;background:{{ p.pauseColor }};color:#1b1b1b;\">T<\u002Fspan>\n                  <div style=\"flex:1;display:flex;flex-direction:column;gap:2px;\">\n                    <span style=\"font-size:14.5px;font-weight:500;\">Théo<\u002Fspan>\n                    <span style=\"font-size:12.5px;color:{{ p.dim }};font-family:{{ p.fontLabel }};\">{{ p.previewText }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ isIos }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"flex:none;height:26px;display:flex;align-items:center;justify-content:center;\"><div style=\"width:140px;height:5px;border-radius:3px;background:{{ p.text }};opacity:.28;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isAndroid }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"flex:none;height:42px;display:flex;align-items:center;justify-content:center;gap:62px;\">\n                <div style=\"width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:9px solid {{ p.dim }};\"><\u002Fdiv>\n                <div style=\"width:13px;height:13px;border-radius:50%;border:2px solid {{ p.dim }};\"><\u002Fdiv>\n                <div style=\"width:12px;height:12px;border-radius:2px;border:2px solid {{ p.dim }};\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <p style=\"max-width:920px;margin:30px 0 0;font-size:12.5px;color:#9a978f;line-height:1.6;\">Trois niveaux par cas : <strong style=\"font-weight:600;color:#2c2a26;\">veto absolu<\u002Fstrong> (jamais inclus, même forcé), <strong style=\"font-weight:600;color:#2c2a26;\">exclu par défaut<\u002Fstrong> (révocable à l'envoi), <strong style=\"font-weight:600;color:#2c2a26;\">priorité basse<\u002Fstrong> (inclus, en retrait). L'aperçu en bas montre l'effet concret sur un contact en pause.<\u002Fp>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  CATS = [\n    { key:'pause', title:'Contacts en pause', sub:'des liens que tu as volontairement mis de côté', color:'#ACA0C0' },\n    { key:'tendu', title:'Relations tendues', sub:'un froid, un désaccord récent', color:'#C8917E' },\n    { key:'negative', title:'Ressenti négatif', sub:'les personnes que tu as marquées comme négatives', color:'#C8917E' },\n    { key:'sommeil', title:'Liens en sommeil', sub:'sans nouvelles depuis longtemps', color:'#8AA0BE' },\n  ];\n  LEVELS = [\n    { key:'abs', label:'Veto absolu', desc:'Jamais inclus, même si tu forces. swab te protège du geste.' },\n    { key:'rev', label:'Exclu par défaut', desc:'Retiré à l\\u2019envoi, mais toujours réaffichable d\\u2019un tap.' },\n    { key:'mod', label:'Priorité basse', desc:'Inclus, mais placé en retrait, sans priorité.' },\n  ];\n  PREVIEW = { abs:'Ne recevra jamais tes envies — option verrouillée.', rev:'Exclu par défaut, mais tu pourras le réintégrer à l\\u2019envoi.', mod:'Recevra tes envies, en arrière-plan.' };\n\n  state = {\n    platform:'ios', treatment:'A',\n    rules: { pause:'rev', tendu:'abs', negative:'abs', sommeil:'rev' },\n  };\n\n  theme(mode){\n    const A = this.state.treatment === 'A';\n    const fonts = A\n      ? { fontDisplay:\"'Newsreader', Georgia, serif\", fontBody:\"'Hanken Grotesk', system-ui, sans-serif\", fontLabel:\"'Hanken Grotesk', system-ui, sans-serif\" }\n      : { fontDisplay:\"'Spectral', Georgia, serif\", fontBody:\"'Spectral', Georgia, serif\", fontLabel:\"'Hanken Grotesk', system-ui, sans-serif\" };\n    const sets = {\n      A: {\n        dark:  { bg:'#16120D', surface:'#201A14', surface2:'#2B231B', text:'#F0E8DC', dim:'#A99B88', faint:'#6F6456', line:'rgba(240,232,220,0.12)', accent:'#AAC0A2', accentText:'#16120D' },\n        light: { bg:'#F1EBE2', surface:'#FFFFFF', surface2:'#F7F1E8', text:'#2B2418', dim:'#7C7060', faint:'#B0A492', line:'rgba(43,36,24,0.12)', accent:'#5C7A54', accentText:'#FFFFFF' },\n      },\n      B: {\n        dark:  { bg:'#0F1316', surface:'#171C20', surface2:'#202830', text:'#E6EBEC', dim:'#94A1A8', faint:'#5F6B72', line:'rgba(230,235,236,0.12)', accent:'#D0A695', accentText:'#101417' },\n        light: { bg:'#E9EDEF', surface:'#FFFFFF', surface2:'#F2F6F7', text:'#1C2427', dim:'#69757C', faint:'#9BA7AD', line:'rgba(28,36,39,0.12)', accent:'#9E6A55', accentText:'#FFFFFF' },\n      },\n    };\n    return { ...fonts, ...sets[this.state.treatment][mode] };\n  }\n\n  buildPhone(mode){\n    const T = this.theme(mode);\n    const s = this.state;\n    const cats = this.CATS.map(cat => ({\n      title:cat.title, sub:cat.sub, color:cat.color,\n      options: this.LEVELS.map(l => {\n        const on = s.rules[cat.key] === l.key;\n        return {\n          label:l.label, desc:l.desc, weight: on ? '600' : '500',\n          bg: on ? T.surface2 : 'transparent', bd: on ? T.accent : T.line,\n          ringBd: on ? T.accent : T.faint, ringBg: 'transparent', dot: on ? T.accent : 'transparent',\n          onClick: () => this.setState(x => ({ rules: { ...x.rules, [cat.key]: l.key } })),\n        };\n      }),\n    }));\n    return {\n      label: mode==='dark' ? 'Sombre' : 'Clair',\n      meta: (this.state.treatment==='A' ? 'Traitement A' : 'Traitement B') + ' · ' + (this.state.platform==='ios' ? 'iOS' : 'Android'),\n      ...T, cats, pauseColor:'#ACA0C0', previewText: this.PREVIEW[s.rules.pause],\n    };\n  }\n\n  renderVals(){\n    const s = this.state;\n    const ios = s.platform==='ios', A = s.treatment==='A';\n    const selBg = '#2c2a26', selFg = '#fff', offBg = 'transparent', offFg = '#6f6c64';\n    return {\n      isIos: ios, isAndroid: !ios,\n      frameOuter: ios ? 54 : 34, frameInner: ios ? 44 : 26,\n      phones: [ this.buildPhone('dark'), this.buildPhone('light') ],\n      iosBg: ios?selBg:offBg, iosFg: ios?selFg:offFg, andBg: !ios?selBg:offBg, andFg: !ios?selFg:offFg,\n      trABg: A?selBg:offBg, trAFg: A?selFg:offFg, trBBg: !A?selBg:offBg, trBFg: !A?selFg:offFg,\n      setPlatform_ios: () => this.setState({ platform:'ios' }),\n      setPlatform_and: () => this.setState({ platform:'android' }),\n      setTreatment_A: () => this.setState({ treatment:'A' }),\n      setTreatment_B: () => this.setState({ treatment:'B' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
