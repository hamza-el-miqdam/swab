# Swab — local development stack: Postgres 17 + the API.
# The mobile app runs on your machine/simulator and points at this API.
#
# Vanilla postgres:17 on purpose (portability guardrail §8.2): the app must
# never depend on anything Neon-specific, and this stack proves it daily.
#
# Secrets note (G1): the credentials below are LOCAL-ONLY defaults for a
# database that lives inside Docker on your machine. Real environments use
# GitHub/Vercel secrets — never commit real credentials here.
name: swab

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: swab
      POSTGRES_PASSWORD: swab_local_dev
      POSTGRES_DB: swab
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swab -d swab"]
      interval: 3s
      timeout: 3s
      retries: 15

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://swab:swab_local_dev@db:5432/swab
      JWT_SECRET: local-dev-only-secret-change-me-0000000000
      NODE_ENV: development
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    # Dev bootstrap: push the Prisma schema (no migration files exist yet —
    # the Data Steward generates real migrations on its Neon dev branch;
    # `db push` is the documented dev-loop equivalent), then start the API.
    command: ["sh", "-c", "pnpm --filter @repo/db exec prisma db push --skip-generate && pnpm --filter @repo/api dev"]
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: rebuild
          path: ./apps/api/package.json

  # Database UI — Adminer: ~20 MB image, full CRUD, zero config.
  # Chosen over DbGate/pgAdmin for footprint (free-tier laptop ethos).
  # Dev-stack only: never deploy this alongside a real environment (G1).
  adminer:
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
